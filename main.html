<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitHub | Issue Tracker</title>
      <link rel="shortcut icon" href="./assets/github-logo.png"
         type="image/x-icon">
      <link rel="stylesheet" href="./style.css">

      <!-- font awesome cdn -->
      <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
         crossorigin="anonymous" referrerpolicy="no-referrer" />

      <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
         href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">

      <!-- Tailwind + daisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   </head>
   <body class="bg-[#F6F8FA]">

      <!-- NAVBAR -->
      <header class="bg-white border-b">

         <div
            class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">

            <!-- LOGO -->
            <div class="text-xl font-bold">
               GitHub Issues Tracker
            </div>

            <!-- SEARCH -->
            <div class="flex items-center gap-2">
               <input id="search-input" type="text"
                  placeholder="Search issues..."
                  class="input input-bordered w-64 h-9">

               <button id="btn-search" class="btn btn-primary btn-sm h-9 px-4">
                  Search
               </button>
            </div>

         </div>

      </header>

      <!-- MAIN -->
      <main class="max-w-7xl mx-auto px-6 py-6">

         <!-- TABS -->
         <div class="flex gap-3 mb-6">

            <button id="btn-all" class="btn btn-sm btn-outline">All</button>
            <button id="btn-open" class="btn btn-sm btn-outline">Open</button>
            <button id="btn-closed"
               class="btn btn-sm btn-obutton">Closed</button>

         </div>

         <!-- SUMMARY CARD -->
         <div
            class="bg-white rounded-lg p-5 flex justify-between items-center shadow-sm">

            <!-- LEFT -->
            <div class="flex items-center gap-4">

               <div class="text-2xl">
                  <img src="./assets/Aperture.png" alt>
               </div>

               <div>
                  <h2 class="font-semibold text-lg">50 Issues</h2>
                  <p class="text-sm text-gray-500">All repository issues
                     tracking</p>
               </div>

            </div>

            <!-- RIGHT -->
            <div class="flex gap-3 text-sm">

               <span class="px-3 py-1 rounded bg-green-100 text-green-600">
                  Open
               </span>

               <span class="px-3 py-1 rounded bg-purple-100 text-purple-600">
                  Closed
               </span>
            </div>
         </div>

         <!-- ISSUE GRID -->
         <div id="spinner" class="flex justify-center my-10 hidden">
            <span class="loading loading-spinner loading-lg"></span>
         </div>
         <div id="issue-container"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-6">

            <!-- dynamic cards -->

         </div>

      </main>
      <dialog id="issue_modal" class="modal">
         <div class="modal-box max-w-xl">

            <div id="modal-content" class="space-y-3">
               <!-- dynamic content -->
            </div>

            <div class="modal-action">
               <form method="dialog">
                  <button class="btn">Close</button>
               </form>
            </div>

         </div>
      </dialog>

      <script src="./JS/main.js"></script>

   </body>
</html>

<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitHub | Issue Tracker</title>
      <link rel="shortcut icon" href="./assets/github-logo.png"
         type="image/x-icon">
      <link rel="stylesheet" href="./style.css">

      <!-- font awesome cdn -->
      <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
         crossorigin="anonymous" referrerpolicy="no-referrer" />

      <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
         href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">

      <!-- Tailwind + daisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   </head>
   <body class="bg-gray-100 flex items-center justify-center min-h-screen">
      <div
         class="bg-white p-8 rounded-xl shadow-md w-full max-w-md space-y-4"> 

         <!-- Title -->
         <div class="justify-center flex">
            <img src="./assets/github-logo.png" alt="GitHub Logo">
         </div>
         <h1 class="text-2xl font-semibold text-center">GitHub Issues
            Tracker</h1>
         <p class="text-[#64748B] text-center">Sign in to manage your issues</p>

         <!-- Inputs -->
         <h2 class="justify-start text-[16px] font-medium">Username</h2>
         <input id="username" type="text" placeholder="Enter Username"
            class="input input-bordered w-full">
         <h2 class="justify-start text-[16px] font-medium">Password</h2>
         <input id="password" type="password" placeholder="Enter Password"
            class="input input-bordered w-full">

         <!-- Button -->
         <button id="btn-login"
            class="btn btn-primary w-full text-[16px] font-medium text-[#FFFFFF]">
            Sign in
         </button>

         <!-- Demo -->
         <h4 class="text-[14px] font-normal text-[#64748B] text-center">Demo
            Credentials:</h4>
         <div class="text-center mt-2 bg-[#64748B10] p-4 rounded-lg">
            <p class="text-sm text-[#64748B]">
               <span class="font-semibold text-[16px]">Username:</span> admin
               <br>
               <span class="font-semibold text-[16px]">Password:</span> admin123
            </p>
         </div>

      </div>

      <script src="./JS/login.js"></script>
   </body>
</html>
